<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Octagonal border -->
  <polygon points="30,2 70,2 98,30 98,70 70,98 30,98 2,70 2,30"
           fill="none" stroke="#4fc3f7" stroke-width="4"/>
  <!-- Inner stepped frame -->
  <polygon points="35,10 65,10 90,35 90,65 65,90 35,90 10,65 10,35"
           fill="none" stroke="#4fc3f7" stroke-width="1.5" opacity="0.4"/>
  <!-- Art-deco S letterform -->
  <path d="M62,24 L38,24 L30,32 L30,44 L38,52 L62,52 L70,60 L70,72 L62,80 L38,80"
        fill="none" stroke="#4fc3f7" stroke-width="6"
        stroke-linecap="square" stroke-linejoin="miter"/>
  <!-- Top chevron -->
  <line x1="42" y1="16" x2="50" y2="12" stroke="#4fc3f7" stroke-width="1.5" opacity="0.5"/>
  <line x1="58" y1="16" x2="50" y2="12" stroke="#4fc3f7" stroke-width="1.5" opacity="0.5"/>
  <!-- Bottom chevron -->
  <line x1="42" y1="88" x2="50" y2="92" stroke="#4fc3f7" stroke-width="1.5" opacity="0.5"/>
  <line x1="58" y1="88" x2="50" y2="92" stroke="#4fc3f7" stroke-width="1.5" opacity="0.5"/>
</svg>
