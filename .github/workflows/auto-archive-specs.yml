name: Auto-archive specs

on:
  push:
    branches: [main]
    paths:
      - 'specs/**'
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  issues: read
  pull-requests: read

jobs:
  archive-specs:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Archive completed specs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Comprehensive scan: check every spec file against its GitHub issue.
          # A spec is archived when its corresponding "Spec NNN: …" issue
          # (with the "spec" label) is closed.

          for spec_file in specs/*.spec.md; do
            [ -f "$spec_file" ] || continue

            # Extract the spec number from the filename (e.g., 001)
            num=$(basename "$spec_file" | grep -oE '^[0-9]+')
            [ -z "$num" ] && continue

            echo "Checking spec ${num} (${spec_file})..."

            # Find the matching issue by title prefix "Spec NNN:"
            # Search for issues with the "spec" label whose title starts with "Spec NNN:"
            issue_state=$(gh issue list \
              --state all \
              --label spec \
              --search "\"Spec ${num}:\" in:title" \
              --json title,state \
              --jq "[.[] | select(.title | startswith(\"Spec ${num}:\"))] | first | .state // empty")

            if [ -z "$issue_state" ]; then
              echo "  No matching issue found — skipping"
              continue
            fi

            if [ "$issue_state" != "closed" ]; then
              echo "  Issue is ${issue_state} — skipping"
              continue
            fi

            echo "  Issue is closed — archiving"
            archive_path=".archive/${spec_file}"
            mkdir -p "$(dirname "$archive_path")"
            git mv "$spec_file" "$archive_path"
            echo "  Archived: ${spec_file} -> ${archive_path}"
          done

          # Commit and push if there are changes
          if git diff --cached --quiet; then
            echo "No specs to archive"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "chore: archive completed specs"
            git push
          fi
