name: Auto-archive specs

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  issues: read
  pull-requests: read

jobs:
  archive-specs:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Archive completed specs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"

          # Use GraphQL to get issues closed by this PR that have the "spec" label
          SPEC_TITLES=$(gh api graphql -f query="
            query {
              repository(owner: \"${OWNER}\", name: \"${REPO_NAME}\") {
                pullRequest(number: ${PR_NUMBER}) {
                  closingIssuesReferences(first: 50) {
                    nodes {
                      title
                      labels(first: 10) {
                        nodes {
                          name
                        }
                      }
                    }
                  }
                }
              }
            }
          " --jq '
            .data.repository.pullRequest.closingIssuesReferences.nodes[]
            | select(.labels.nodes | map(.name) | index("spec"))
            | .title
          ')

          if [ -z "$SPEC_TITLES" ]; then
            echo "No spec issues closed by this PR"
            exit 0
          fi

          echo "$SPEC_TITLES" | while IFS= read -r title; do
            # Extract spec number from issue title like "Spec 001: ..."
            num=$(echo "$title" | sed -n 's/^Spec \([0-9]\+\):.*/\1/p')
            [ -z "$num" ] && continue

            # Find matching spec file(s)
            for spec_file in specs/${num}-*.spec.md; do
              [ -f "$spec_file" ] || continue

              # Mirror the repo path under .archive/
              archive_path=".archive/${spec_file}"
              mkdir -p "$(dirname "$archive_path")"
              git mv "$spec_file" "$archive_path"
              echo "Archived: ${spec_file} -> ${archive_path}"
            done
          done

          # Commit and push if there are changes
          if git diff --cached --quiet; then
            echo "No specs to archive"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "chore: archive completed specs"
            git push
          fi
