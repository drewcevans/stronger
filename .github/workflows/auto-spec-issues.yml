name: Auto-spec Issues

on:
  push:
    branches: [main]
    paths:
      - "specs/**"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  create-issues:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ensure spec label exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh label create spec --color "0E8A16" --description "Auto-created from a spec file" --force

      - name: Create issues for new specs
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          for spec in specs/*.spec.md; do
            [ -f "$spec" ] || continue

            # Extract title from first line: "# Feature: <title>"
            title=$(head -1 "$spec" | sed 's/^# Feature: //')

            # Extract spec number from filename (e.g., 001)
            num=$(basename "$spec" | grep -oE '^[0-9]+')

            # Build the issue title
            issue_title="Spec ${num}: ${title}"

            # Check if an issue with this exact title already exists
            # --search is fuzzy, so jq does an exact match to avoid false positives
            existing=$(gh issue list --state all --search "\"${issue_title}\" in:title" --json title --jq "[.[] | select(.title == \"${issue_title}\")] | length")

            if [ "$existing" -ne 0 ]; then
              echo "Issue already exists: ${issue_title}"
              continue
            fi

            # Extract summary (first blockquote line)
            summary=$(grep -m1 '^> ' "$spec" | sed 's/^> //')

            # Create the issue
            spec_url="https://github.com/${REPO}/blob/main/${spec}"
            gh issue create \
              --title "${issue_title}" \
              --body "$(printf '%s\n\n---\n📄 **Spec file**: [`%s`](%s)' "${summary}" "$(basename "$spec")" "${spec_url}")" \
              --label "spec"

            echo "Created issue: ${issue_title}"
          done
